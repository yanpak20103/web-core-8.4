<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css">
    <link  rel="stylesheet" href="style.css">
    <title>Block data</title>
</head>
<body>

    <div class="box">
        <div class="header">
            <div class="headline">Ремонт техники различных брэндов</div>
        </div>

        <div class="swiper brand-swiper">
            <div class="swiper-wrapper">

                <div class="swiper-slide">
                    <div class="brand-lenovo">
                        <img src="lenovo.svg" alt="lenovo-logo" class="brand-logo">
                        <button class="brand-btn">
                            <img src="go.svg" alt="go-button" class="go-btn">
                        </button>
                    </div>
                </div>

                <div class="swiper-slide">
                    <div class="brand-samsung">
                        <img src="samsung.svg" alt="samsung-logo" class="brand-logo">
                        <button class="brand-btn">
                            <img src="go.svg" alt="go-button" class="go-btn">
                        </button>
                    </div>
                </div>

                <div class="swiper-slide">
                    <div class="brand-apple">
                        <img src="apple.svg" alt="apple-logo" class="brand-logo">
                        <button class="brand-btn">
                            <img src="go.svg" alt="go-button" class="go-btn">
                        </button>
                    </div>
                </div>

                <div class="swiper-slide">
                    <div class="brand-viewsonic">
                        <img src="viewsonic.svg" alt="viewsonic-logo" class="brand-logo">
                        <button class="brand-btn">
                            <img src="go.svg" alt="go-button" class="go-btn">
                        </button>
                    </div>
                </div>

                <div class="swiper-slide">
                    <div class="brand-bosch">
                        <img src="bosch.svg" alt="bosch-logo" class="brand-logo">
                        <button class="brand-btn">
                            <img src="go.svg" alt="go-button" class="go-btn">
                        </button>
                    </div>
                </div>

                <div class="swiper-slide">
                    <div class="brand-hp">
                        <img src="hp.svg" alt="hp-logo" class="brand-logo">
                        <button class="brand-btn">
                            <img src="go.svg" alt="go-button" class="go-btn">
                        </button>
                    </div>
                </div>

                <div class="swiper-slide">
                    <div class="brand-acer">
                        <img src="acer.svg" alt="acer-logo" class="brand-logo">
                        <button class="brand-btn">
                            <img src="go.svg" alt="go-button" class="go-btn">
                        </button>
                    </div>
                </div>

                <div class="swiper-slide">
                    <div class="brand-sony">
                        <img src="sony.svg" alt="sony-logo" class="brand-logo">
                        <button class="brand-btn">
                            <img src="go.svg" alt="go-button" class="go-btn">
                        </button>
                    </div>
                </div>

                <div class="swiper-slide extra-pc-slide">
                    <div class="brand-lenovo">
                        <img src="lenovo.svg" alt="Lenovo" class="brand-logo">
                        <button class="brand-btn">
                            <img src="go.svg" alt="Go" class="go-btn">
                        </button>
                    </div>
                </div>

                <div class="swiper-slide extra-pc-slide">
                    <div class="brand-samsung">
                        <img src="samsung.svg" alt="Samsung" class="brand-logo">
                            <button class="brand-btn">
                                <img src="go.svg" alt="Go" class="go-btn">
                            </button>
                    </div>
                </div>

                <div class="swiper-slide extra-pc-slide">
                    <div class="brand-apple">
                        <img src="apple.svg" alt="Apple" class="brand-logo">
                        <button class="brand-btn">
                            <img src="go.svg" alt="Go" class="go-btn">
                        </button>
                    </div>
                </div>

            </div>

            <div class="swiper-pagination"></div>

        </div>

        <button class="show-more-btn" id="toggleBrands">
            <img src="icon.svg" alt="icon">
            <span class="btn-text">Показать все</span>
        </button>

    </div>

     <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
     <script src="script.js"></script>
</body>
</html>
